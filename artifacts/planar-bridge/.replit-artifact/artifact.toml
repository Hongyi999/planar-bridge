kind = "web"
previewPath = "/"
title = "PlanarBridge"
version = "1.0.0"
id = "planar-bridge-app"

[[services]]
localPort = 3000
name = "PlanarBridge Mini Program"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/planar-bridge run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/planar-bridge", "run", "build:h5"]

[services.production.build.env]
NODE_ENV = "production"
